---
# Thin caller of the generalized chrysa lean CI (gate = pre-commit; reports → Sonar;
# test matrix; sonar). Auto-versioning stays in release.yml (GitVersion).

name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main, "feat/**", "fix/**", "chore/**", "ci/**"]
    workflow_dispatch:

permissions:
    contents: read
    checks: write
    pull-requests: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        uses: chrysa/github-actions/.github/workflows/ci-python.yml@v1.2.0
        with:
            package: django_pytest
            sources: "django_pytest tests"
            project-key: chrysa_django-pytest
            project-name: django-pytest
            sonar-sources: .
            typecheck-paths: django_pytest
        secrets: inherit
