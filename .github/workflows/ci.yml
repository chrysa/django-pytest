---
name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches:
            - main
            - "feat/**"
            - "fix/**"
            - "chore/**"
            - "ci/**"
    workflow_dispatch:

permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# NOTE: Lint (ruff/mypy/pre-commit) does NOT run here. It lives in pre-commit
#       (local) and is replayed in CI only at release time via release.yml's
#       lint gate. This keeps tests gating PRs without per-push lint billing.

jobs:
    test:
        name: Docker tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6.0.2

            - name: Run tests via Docker
              run: make docker-test

    sonar:
        name: SonarCloud
        if: ${{ github.actor != 'dependabot[bot]' }}
        needs: test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            pull-requests: read
        steps:
            - uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0

            - uses: chrysa/github-actions/sonar-scan-python@v1.0.12
              with:
                  python-version: "3.14"
                  sonar-token: ${{ secrets.SONAR_TOKEN }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  project-key: chrysa_django-pytest
                  organization: chrysa
                  project-name: django-pytest
                  sources: .
                  tests: tests
                  coverage-report: coverage.xml
